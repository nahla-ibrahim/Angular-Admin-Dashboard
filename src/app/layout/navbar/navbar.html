<!-- ///////////desktop & tablet/////////// -->
<div class="bg-white lg:flex items-center justify-between container mx-auto px-3 h-18 hidden">
  <!-- sidebar toggle -->
  @if (!isOpenSidebar) {
    <div class="flex items-center gap-4 justify-between">
      <fa-icon [icon]="kiwiBird" class="text-3xl cursor-pointer"></fa-icon>
      <h1 class="text-xl font-semibold">Admin Dashboard</h1>
    </div>
  }
  <!-- CENTER (SEARCH) -->
  <div class="hidden lg:flex items-center w-1/3">
    <div class="relative w-full flex items-center">
      <input
        type="text"
        placeholder="Search..."
        class="w-full border-none bg-gray-200 rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:none"
      />
      <span class="absolute left-3 top-2.5 text-gray-400">
        <fa-icon [icon]="search"></fa-icon>
      </span>
    </div>
  </div>
  <!-- RIGHT (icons)-->
  <div class="flex items-center gap-5">
    <fa-icon [icon]="Calendar" class="text-2xl cursor-pointer"></fa-icon>
    <div class="relative">
      <fa-icon [icon]="Bell" class="text-2xl cursor-pointer"> </fa-icon>
      <span class="absolute -top-1 -right-1 bg-primary text-xs px-1 rounded-full text-white">
        3
      </span>
    </div>
    <fa-icon [icon]="Moon" class="text-2xl cursor-pointer"></fa-icon>
    <fa-icon [icon]="Sun" class="text-2xl cursor-pointer hidden"></fa-icon>
    <div class="flex items-center gap-2 cursor-pointer bg-gray-200 px-5 py-1 rounded-full">
      <div class="flex flex-col">
        <span class="hidden md:block font-medium text-md"> Emilys </span>
        <span class="hidden md:block font-light text-sm">
          admin
          <fa-icon [icon]="AngleDown" class="text-sm font-light"></fa-icon>
        </span>
      </div>

      <img src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full border-2 border-white" />
    </div>
  </div>
</div>

<!-- ///////////mobile/////////// -->

<div
  class="bg-white lg:hidden flex items-center justify-between container mx-auto px-3 h-16 relative"
>
  <div class="flex justify-between items-center w-full">
    <fa-icon [icon]="arrowRight" class="text-2xl cursor-pointer" (click)="openSidebar()" />
    @if (!isOpenSidebar) {
      <div class="flex items-center gap-4 justify-between">
        <fa-icon [icon]="kiwiBird" class="text-3xl cursor-pointer"></fa-icon>
        <h1 class="text-xl font-semibold">Admin Dashboard</h1>
      </div>
    }
    <fa-icon [icon]="bars" class="text-2xl cursor-pointer" (click)="openToggle()"></fa-icon>
  </div>
  @if (isToggleOpened) {
    <div
      class="flex flex-col absolute top-16 right-0 w-full bg-white shadow-lg px-6 py-10 gap-10 rounded-b-3xl"
    >
      <!-- CENTER (SEARCH) -->
      <div class="relative w-full flex items-center">
        <input
          type="text"
          placeholder="Search..."
          class="w-full border-none bg-gray-200 rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:none"
        />
        <span class="absolute left-3 top-2.5 text-gray-400">
          <fa-icon [icon]="search"></fa-icon>
        </span>
      </div>
      <!-- RIGHT (icons)-->
      <div class="flex lg:hidden justify-around">
        <fa-icon
          [icon]="Calendar"
          class="text-2xl cursor-pointer bg-gray-400 rounded-full p-1"
        ></fa-icon>
        <div class="relative">
          <fa-icon [icon]="Bell" class="text-2xl cursor-pointer bg-gray-400 rounded-full p-1">
          </fa-icon>
          <span class="absolute -top-1 -right-1 bg-primary text-xs px-1 rounded-full text-white">
            3
          </span>
        </div>
        <fa-icon
          [icon]="Moon"
          class="text-xl cursor-pointer bg-gray-400 rounded-full p-1"
        ></fa-icon>
        <fa-icon
          [icon]="Sun"
          class="text-2xl cursor-pointer hidden bg-gray-400 rounded-full p-1"
        ></fa-icon>
      </div>
      <div
        class="flex justify-between items-center gap-2 cursor-pointer bg-gray-200 px-5 py-1 rounded-full"
      >
        <span class="font-medium text-md"> Emilys </span>
        <span class="font-medium text-md">
          admin
          <fa-icon [icon]="AngleDown" class="text-md font-medium"></fa-icon>
        </span>

        <img src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full border-2 border-white" />
      </div>
    </div>
  }
</div>
